# pages.yml: publish the external docs site to GitHub Pages (SECONDARY mirror).
#
# GitHub Pages is the secondary public mirror per ADR-0110 §3.15. The primary
# deploy targets are NGINX/K8s (cloud/on-prem/hybrid) and the Zarf bundle
# (air-gap). This workflow is workflow_dispatch-ONLY: it is invoked deliberately,
# never on push/PR (org auto-CI is off per the local-CI-first policy). The local
# gate (`just ci`) is the merge authority for this repo's own changes.
#
# All third-party actions are SHA-pinned (Renovate keeps the SHAs fresh).
name: pages

on:
  workflow_dispatch:
    inputs:
      content_ref:
        description: "Ref of the workspace repo to source authored docs-content from"
        required: false
        default: main
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout docs-site
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.1.42

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12.7"

      - name: Install toolchains
        run: |
          bun install --frozen-lockfile
          pip install -r requirements.txt

      - name: Build external static site
        run: |
          # Pages is the standalone mirror: it ships the in-repo fixture content
          # unless a content dir is mounted. The authored-content mirror lives in
          # the workspace repo and is staged by the parent workspace for the
          # primary (NGINX/Zarf) builds.
          bun run build:api
          bash scripts/build-external.sh --api-dir .build-workspace/api
          bash scripts/offline-smoke.sh

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
