# K8s manifests for the CuraOS external docs site (on-prem / hybrid / cloud).
#
# The image is built from hosting/nginx/Dockerfile and published to GHCR by the
# deliberate release pipeline (curaos-deploy). The image ref is digest-pinned at
# deploy time; the placeholder below is replaced by the release pipeline.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curaos-docs-site
  labels:
    app.kubernetes.io/name: curaos-docs-site
    app.kubernetes.io/part-of: curaos
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: curaos-docs-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: curaos-docs-site
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: docs
          # Replaced at release time with ghcr.io/cura-care-oriented-stack/curaos-docs-site@sha256:<digest>
          image: ghcr.io/cura-care-oriented-stack/curaos-docs-site:DIGEST_PINNED_AT_RELEASE
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: curaos-docs-site
  labels:
    app.kubernetes.io/name: curaos-docs-site
spec:
  selector:
    app.kubernetes.io/name: curaos-docs-site
  ports:
    - name: http
      port: 80
      targetPort: 8080
