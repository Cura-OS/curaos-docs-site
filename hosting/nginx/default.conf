# NGINX server block for the static CuraOS docs site.
# Listens on an unprivileged port so the container runs as a non-root user.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static docs: try the file, then a directory index, else 404.
    location / {
        try_files $uri $uri/ =404;
    }

    # Long-cache the fingerprinted Material assets.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health endpoint for K8s probes.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
