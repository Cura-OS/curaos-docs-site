# Zarf component INPUT for the CuraOS air-gap docs site.
#
# This is a component fragment the signed-bundle host (Story 3 / curaos-deploy)
# composes into the main ops/zarf/zarf.yaml. It carries the digest-pinned NGINX
# docs image + the K8s manifests so the docs site deploys with ZERO external
# egress inside an air-gap install. S4 emits this input; S3 signs/packages it.
components:
  - name: curaos-docs-site
    required: false
    description: "CuraOS external documentation site: offline MkDocs Material static served by NGINX. Zero-egress."
    manifests:
      - name: curaos-docs-site
        files:
          - ../k8s/docs-site.yaml
    images:
      # Built from hosting/nginx/Dockerfile and published to GHCR by curaos-deploy.
      # Digest is pinned by the release pipeline at bundle-assembly time.
      - ghcr.io/cura-care-oriented-stack/curaos-docs-site:DIGEST_PINNED_AT_RELEASE
