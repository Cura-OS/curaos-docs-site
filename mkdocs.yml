# MkDocs Material: CuraOS external / customer-facing / offline / air-gap docs.
#
# Authored content lives in this repo under examples/content (the resolvable
# default); scripts/build-external.sh stages it into .build-workspace/docs (the
# docs_dir below) before invoking `mkdocs build --strict`. A synced copy lives in
# the workspace mirror (ai/curaos/curaos-docs-site/docs-content/) for the doc
# graph.
#
# Browser-side search = the stock Material `search` plugin (lunr.js, client-side).
# Air-gap zero-egress is achieved by `theme.font: false` (no Google Fonts CDN) +
# serving the static output over HTTP via NGINX/Caddy. The site emits no remote
# <script>/<link> references, proven by scripts/offline-smoke.sh. The Aqua skin
# (docs/stylesheets/extra.css) is bundled local CSS, not a remote stylesheet.

site_name: CuraOS Documentation
site_description: >-
  CuraOS: composable, self-hosted-first care platform. Customer and operator
  documentation: getting started, install, architecture, apps guide, API
  reference, auth setup, integration, and runbooks.
site_url: ""
use_directory_urls: true
docs_dir: .build-workspace/docs
site_dir: site
strict: true

theme:
  name: material
  language: en
  # Custom Material override theme: overrides/ holds the GENERATED templates
  # (main.html + the home.html hero landing) emitted by src/theme/emit-theme.ts.
  # The landing replaces stock `grid cards` with a real generated hero + inline
  # SVG architecture art, all driven by the shared design tokens.
  custom_dir: overrides
  # Self-host nothing from Google Fonts; air-gap installs have no CDN egress.
  # `font: false` disables Material's Google Fonts CDN (zero remote font <link>).
  # The actual self-hosted woff2 (Inter + JetBrains Mono + IBM Plex Sans Arabic)
  # is bundled and declared via @font-face in extra.css (a local stylesheet), so
  # the fonts render byte-identically offline / air-gap. The "Aurora" identity
  # (de-tealed indigo-violet + warm coral, OKLCH) is layered on via extra_css.
  font: false
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    # The named seed is irrelevant to the final look: extra.css overrides every
    # Material color variable from the OKLCH "Aurora" tokens (de-tealed). The
    # seed below is kept neutral (indigo) only so any pre-CSS flash matches the
    # brand hue family rather than a default. Light + dark both honored.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Local stylesheet: maps Material's CSS variables onto the @curaos/ui "Aqua"
# design tokens (ui-kit tokens.json) so the docs read like the live apps. Bundled
# into the static output (no remote fetch), so air-gap + the strict CSP hold.
extra_css:
  # Use the variant-specific stylesheet path in production so CDN/browser caches
  # of the legacy generic extra.css cannot mask a regenerated skin.
  - stylesheets/extra.aurora.css

plugins:
  # Client-side lunr.js search index; works fully offline when the static
  # output is served over HTTP (NGINX/Caddy/Zarf air-gap). No network egress.
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

# Navigation. Every entry maps to a real authored page in the content tree.
# Grouped into Overview / Architecture / Build & integrate / Operate so the
# growing page set stays navigable; keep leaf paths stable for deep links.
nav:
  - Home: index.md
  - Getting started: getting-started/index.md
  - Install (self-host): install/index.md
  - Architecture:
      - Overview: architecture/index.md
      - Capabilities: capabilities/index.md
      - Workflow & builder: builder/index.md
      - Services catalogue: services/index.md
      - Apps guide: apps/index.md
  - Build & integrate:
      - Integration: integration/index.md
      - API reference: api/index.md
      - Event contracts: events/index.md
      # Generated, versioned, deny-by-default reference (public-api-docs.ts).
      # Entry page links into api/ + events/ version switchers; per-version and
      # per-service pages are discovered via those links. UD-8-approved surface:
      # party-core-service (HTTP); party-core + tenancy-core (events); switcher
      # window = current + previous minor (ADR-0262 retention).
      - API & event reference (generated): reference/index.md
      - Auth setup: auth/index.md
  - Operate:
      - Operations: operations/index.md
      - Security & compliance: security/index.md

extra:
  generator: false
